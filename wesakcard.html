<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Vesak Card Maker with Movable Text 🎇</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles-engine@2/tsparticles.engine.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
    <style>
        /* Drag කරන්න පුළුවන් හැම දේටම පොදු ස්ටයිල් */
        .draggable {
            cursor: move;
            user-select: none;
            touch-action: none;
            border: 1px dashed transparent;
        }
        /* Select කරලා තියෙන Element එක වටේට පොඩි බෝඩරයක් පෙන්වීමට */
        .element-active {
            border-color: #f59e0b !important;
            background: rgba(245, 158, 11, 0.05);
        }
        #tsparticles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }
        main, header, footer {
            position: relative;
            z-index: 10;
        }
        /* ⬇️ ස්ටිකර් ට්‍රේ එකට ගැලපෙන සිහින් Custom Scrollbar රටාව ⬇️ */
        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: #1c1917;
            border-radius: 8px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: #78716c;
            border-radius: 8px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: #d97706;
        }
    </style>
</head>
<body class="bg-stone-950 text-stone-100 min-h-screen font-sans flex flex-col items-center justify-between p-4 relative overflow-x-hidden">

    <div id="tsparticles"></div>

    <header class="text-center my-4">
        <h1 class="text-3xl font-bold text-amber-400 drop-shadow-[0_2px_8px_rgba(251,191,36,0.4)]">ඩිජිටල් වෙසක් සුබපැතුම් පත් කර්තෘ </h1>
    </header>

    <main class="w-full max-w-7xl flex flex-col lg:flex-row gap-6 items-start justify-center flex-1 px-2">
        
        <div class="w-full lg:w-1/3 bg-stone-900/80 backdrop-blur-md p-6 rounded-2xl shadow-xl border border-stone-800 flex flex-col gap-4 sticky top-4">
            
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-stone-300 mb-1">ලබන්නාගේ නම (To)</label>
                    <input type="text" id="toInput" class="w-full p-2 bg-stone-950 border border-stone-800 rounded-lg text-sm text-stone-100 focus:outline-none focus:ring-1 focus:ring-amber-500" placeholder="යවන්නාගේ නම">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-stone-300 mb-1">යවන්නාගේ නම (From)</label>
                    <input type="text" id="fromInput" class="w-full p-2 bg-stone-950 border border-stone-800 rounded-lg text-sm text-stone-100 focus:outline-none focus:ring-1 focus:ring-amber-500" placeholder="ලබන්නාගේ නම">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-stone-300 mb-1">පසුබිම් වර්ණය</label>
                    <input type="color" id="bgColor" value="#451a03" class="w-full h-9 rounded-lg cursor-pointer border border-stone-700 bg-transparent">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-stone-300 mb-1">අකුරු වල වර්ණය</label>
                    <input type="color" id="textColor" value="#fde047" class="w-full h-9 rounded-lg cursor-pointer border border-stone-700 bg-transparent">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-stone-300 mb-1">සුබපැතුම් වැකිය</label>
                <textarea id="cardText" rows="2" class="w-full p-3 bg-stone-950 border border-stone-800 rounded-xl text-sm focus:outline-none focus:ring-1 focus:ring-amber-500 text-stone-100" placeholder="වෙසක් මංගල්‍යයක් වේවා!"></textarea>
            </div>

            <div>
                <label class="block text-xs font-semibold text-stone-300 mb-2">ස්ටිකර් එකතු කරන්න (Click to Add)</label>
                <div class="grid grid-cols-3 gap-2 p-2 bg-stone-950 rounded-xl border border-stone-800 max-h-44 overflow-y-auto scrollbar-thin">
                    <button onclick="addSticker('buddha_aura.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="buddha_aura.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('nelum_mala.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="nelum_mala.png" alt="Lotus" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('vesak_kuduwa.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="vesak_kuduwa.png" alt="Lantern" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('pahan.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="pahan.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('image05.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="image05.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('image06.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="image06.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('image07.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="image07.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('image08.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="image08.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('image09.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="image09.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('image10.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="image10.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('image11.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="image11.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                    <button onclick="addSticker('image12.png')" class="p-2 bg-stone-900 hover:bg-stone-800 rounded-lg flex justify-center transition border border-stone-800">
                        <img src="image12.png" alt="Lamp" class="w-10 h-10 object-contain">
                    </button>
                </div>
            </div>

            <div id="resizeControlContainer" class="bg-stone-950 p-3 rounded-xl border border-stone-800 hidden">
                <label class="block text-xs font-semibold text-amber-400 mb-1">තෝරාගත් Sticker ප්‍රමාණය (Resize Sticker)</label>
                <input type="range" id="stickerSizeSlider" min="30" max="250" value="80" class="w-full h-2 bg-stone-800 rounded-lg appearance-none cursor-pointer accent-amber-500">
                <p class="text-[10px] text-stone-500 mt-1">*Sticker delete කරන්න Double Click කරන්න. අකුරු ඇති තැන් මවුස් එකෙන් ඇද මාරු කරන්න.</p>
            </div>

            <button id="downloadBtn" class="w-full mt-2 bg-amber-500 hover:bg-amber-600 text-stone-950 font-bold py-3 px-4 rounded-xl transition duration-200 shadow-lg text-sm">
                කාඩ්පත බාගත කරගන්න (Download Card) 📥
            </button>
        </div>

        <div class="w-full lg:w-2/3 flex flex-col items-center justify-center">
            
            <div id="captureArea" class="relative w-[600px] h-[400px] shadow-2xl rounded-xl overflow-hidden border border-amber-500/10 select-none" style="background-color: #451a03;">
                
                <div class="absolute inset-4 border-2 border-dashed border-amber-400/20 rounded-lg pointer-events-none"></div>
                
                <div id="toOutput" class="draggable absolute top-10 left-10 font-bold text-lg text-fde047 p-1 rounded transition-all max-w-[250px] break-words" style="color: #fde047;"></div>

                <div id="cardDisplayOutput" class="draggable absolute top-[160px] left-[100px] w-[400px] text-center font-bold text-2xl text-amber-300 drop-shadow-md p-2 rounded whitespace-pre-line" style="color: #fde047;">
                    වෙසක් මංගල්‍යයක් වේවා!
                </div>

                <div id="fromOutput" class="draggable absolute bottom-12 right-12 font-bold text-base text-fde047 p-1 rounded transition-all max-w-[250px] break-words text-right" style="color: #fde047;"></div>

                </div>
        </div>
    </main>

    <footer class="text-center text-xs text-stone-600 my-4">
        Vesak Greeting Card Builder © 2026 DP Education bulathkohupitiya. All rights reserved. 
    </footer>

    <script>
        const bgColorInput = document.getElementById('bgColor');
        const textColorInput = document.getElementById('textColor');
        const cardTextInput = document.getElementById('cardText');
        const toInput = document.getElementById('toInput');
        const fromInput = document.getElementById('fromInput');
        
        const captureArea = document.getElementById('captureArea');
        const cardDisplayOutput = document.getElementById('cardDisplayOutput');
        const toOutput = document.getElementById('toOutput');
        const fromOutput = document.getElementById('fromOutput');
        
        const downloadBtn = document.getElementById('downloadBtn');
        const resizeControlContainer = document.getElementById('resizeControlContainer');
        const stickerSizeSlider = document.getElementById('stickerSizeSlider');

        let activeElement = null;

        // tsParticles Firefly Setup
        (async () => {
            await loadFull(tsParticles); 
            await tsParticles.load("tsparticles", {
                preset: "firefly",
                particles: {
                    color: { value: "#f59e0b" },
                    number: { value: 30 },
                    size: { value: { min: 2, max: 5 } },
                    opacity: { value: { min: 0.3, max: 0.8 }, animation: { enable: true, speed: 1, sync: false } },
                    move: { enable: true, speed: 0.6, direction: "top", outModes: { default: "out" } }
                },
                background: { color: "transparent" }
            });
        })();

        // 1. Live Text Inputs (Initial Text Setup)
        bgColorInput.addEventListener('input', (e) => captureArea.style.backgroundColor = e.target.value);
        
        textColorInput.addEventListener('input', (e) => {
            cardDisplayOutput.style.color = e.target.value;
            toOutput.style.color = e.target.value;
            fromOutput.style.color = e.target.value;
        });
        
        cardTextInput.addEventListener('input', (e) => {
            cardDisplayOutput.innerText = e.target.value || "ඔබට ශ්‍රද්ධාවන්ත වෙසක් මංගල්‍යයක් වේවා!";
        });
        
        toInput.addEventListener('input', (e) => { 
            toOutput.innerText = e.target.value ? "To: " + e.target.value : ""; 
        });
        
        fromInput.addEventListener('input', (e) => { 
            fromOutput.innerText = e.target.value ? "From: " + e.target.value : ""; 
        });

        // 2. Setup dragging for default text elements
        makeElementDraggable(toOutput);
        makeElementDraggable(cardDisplayOutput);
        makeElementDraggable(fromOutput);

        // Text clicks for border highlighting
        [toOutput, cardDisplayOutput, fromOutput].forEach(el => {
            el.addEventListener('click', (e) => {
                e.stopPropagation();
                selectElement(el, false); // select without showing resize slider
            });
        });

        // 3. Add Sticker Function
        function addSticker(src) {
            const img = document.createElement('img');
            img.src = src;
            img.className = 'draggable sticker absolute w-20 h-20 object-contain';
            img.style.left = '40px';
            img.style.top = '40px';

            makeElementDraggable(img);

            img.addEventListener('click', (e) => { 
                e.stopPropagation(); 
                selectElement(img, true); // select and show resize slider
            });
            
            img.addEventListener('dblclick', () => {
                img.remove();
                resizeControlContainer.classList.add('hidden');
                activeElement = null;
            });

            captureArea.appendChild(img);
            selectElement(img, true);
        }

        // 4. Select Element Logic
        function selectElement(element, isSticker) {
            document.querySelectorAll('.draggable').forEach(s => s.classList.remove('element-active'));
            activeElement = element;
            activeElement.classList.add('element-active');
            
            if (isSticker) {
                resizeControlContainer.classList.remove('hidden');
                stickerSizeSlider.value = activeElement.offsetWidth;
            } else {
                resizeControlContainer.classList.add('hidden'); // Hide slider for plain texts
            }
        }

        // Clear selection on background click
        captureArea.addEventListener('click', () => {
            document.querySelectorAll('.draggable').forEach(s => s.classList.remove('element-active'));
            resizeControlContainer.classList.add('hidden');
            activeElement = null;
        });

        // Resize slider logic
        stickerSizeSlider.addEventListener('input', (e) => {
            if (activeElement && activeElement.tagName === 'IMG') {
                activeElement.style.width = e.target.value + 'px';
                activeElement.style.height = e.target.value + 'px';
            }
        });

        // 5. Advanced Draggable Core (Supports Text and Images, Mouse and Touch)
        function makeElementDraggable(element) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            element.onmousedown = dragMouseDown;
            element.ontouchstart = dragTouchStart;

            function dragMouseDown(e) {
                e.preventDefault();
                // Check if it's an image for the slider representation
                selectElement(element, element.tagName === 'IMG');
                pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = closeDragElement; document.onmousemove = elementDrag;
            }
            function dragTouchStart(e) {
                selectElement(element, element.tagName === 'IMG');
                pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY;
                document.ontouchend = closeDragElement; document.ontouchmove = elementTouchDrag;
            }
            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY;
                element.style.top = (element.offsetTop - pos2) + "px"; element.style.left = (element.offsetLeft - pos1) + "px";
            }
            function elementTouchDrag(e) {
                pos1 = pos3 - e.touches[0].clientX; pos2 = pos4 - e.touches[0].clientY; pos3 = e.touches[0].clientX; pos4 = e.touches[0].clientY;
                element.style.top = (element.offsetTop - pos2) + "px"; element.style.left = (element.offsetLeft - pos1) + "px";
            }
            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null;
            }
        }

        // 6. Download Action
        downloadBtn.addEventListener('click', () => {
            // Clear all borders before downloading
            document.querySelectorAll('.draggable').forEach(s => s.classList.remove('element-active'));
            resizeControlContainer.classList.add('hidden');

            html2canvas(captureArea, { useCORS: true, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Vesak-Card-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
